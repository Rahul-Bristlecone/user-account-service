name: Product service build
on:
  push:
    branches:
      - main
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Perform Linting
        run: |
          source venv/bin/activate
          # Fail the build only on syntax/undefined-name class errors.
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Keep style output visible without failing while legacy style debt is cleaned up.
          flake8 src/ tests/ --count --exit-zero --max-line-length=120 --statistics
      - name: Run Tests with coverage
        run: |
          source venv/bin/activate
          pytest tests/ \
            --cov=product \
            --cov-report=xml \
            --cov-report=html
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

# this sast job is not needed for public repos, in github repo settings, codeQL analysis
# can be enabledby default, if you want custom sast job, you need to create a separate workflow
# and change the default to custom in repo settings and import it in your main workflow.
  sast:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -e .

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
  
  package:
    name: Build and package the product service
    runs-on: ubuntu-latest
    needs: 
      - build_and_test
      - sast
    permissions:
      id-token: write

    steps:
      - name: checkout code
        uses: actions/checkout@v3
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install build
      - name: build the product service package
        run: |
          source venv/bin/activate
          python -m build
      - name: upload the product service package (github actions artifact storage)
        uses: actions/upload-artifact@v4
        with:
          name: product-service-package
          path: dist/*
      - name: upload the product service package to PyPI
        uses: pypa/gh-action-pypi-publish@v1.5.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
  docker:
    runs-on: ubuntu-latest
    needs: package
    steps:  # because we are moving to production grade setup,
            # we will use docker buildx (instead of plain docker build) to 
            # build and push the image to docker hub
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/daemons:product-service-latest 
          # helm will take care of the versioning & tags
      # ✅ Trivy scan step
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/daemons:product-service-latest
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/daemons:product-service-latest
      
      # Below steps are for pushing the image to AWS ECR, 
      # we will use this image in our kubernetes cluster.
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ap-southeast-1   # change to your region
      # - name: Log in to Amazon ECR
      #   uses: aws-actions/amazon-ecr-login@v2
          # aws ecr get-login-password --region us-east-1 \
          #   | docker login --username AWS \
          #     --password-stdin 123456789012.dkr.ecr.us-east-1.amazonaws.com

  # deploy is a next step, but understand this part, we don't usually include it in the pipeline,
  # For testing purpose, we can include it in the pipeline, but for production,
  # we will use gitops like ArgoCD to deploy the image to the kubernetes cluster.
  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push'
    steps:
      - name: Deploy to Kubernetes
        run: |
          echo "For production use ArgoCD."
          echo "This stage should update Helm values repo instead."