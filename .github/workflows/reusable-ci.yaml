# This is a reusable workflow for Godaampe that can be called from other workflows.
# Even from other repositories.
name: Godaampe Reusable CI
on:
  workflow_call:
    inputs:
      service-name:
        description: The name of the service
        required: true
        type: string

      docker-repo:
        description: The Docker repository to push the image to
        required: true
        type: string

      target-environment:
        description: The environment to deploy to (e.g., staging, production)
        required: true
        type: string

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 build

      - name: Lint code
        run: |
          source venv/bin/activate
          flake8 src/ tests/

      - name: Run Tests with coverage
        run: |
          source venv/bin/activate
          pytest tests/ --cov=src --cov-report=xml --cov-report=html
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Build package
        run: |
          source venv/bin/activate
          python -m build

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service-name }}-package
          path: dist/
          
  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.docker-repo }}:${{ inputs.service-name }}-latest 
          # helm will take care of the versioning & tags

      # ✅ Trivy scan step
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.docker-repo }}:${{ inputs.service-name }}-latest
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1' # Exit with code 1 if vulnerabilities are found

      - name: Push image
        run: |
          docker push \
            ${{ secrets.DOCKER_USERNAME }}/${{ inputs.docker-repo }}:${{ inputs.service-name }}-latest 
        # helm will take care of the versioning & tags
