name: ZAP Security Scan

on:
  workflow_call:
    inputs:
      target-url:
        required: true
        type: string

jobs:
  ZapScan:
    runs-on: ubuntu-latest
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ inputs.target-url }}
          # rules_file_name: '.zap/rules.tsv'
          issue_title: 'ZAP Security Scan'
