name: ZAP Security Scan

on:
  workflow_call:
    inputs:
      target-url:
        required: true
        type: string
    secrets: inherit

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: ${{ inputs.target-url }}
          rules_file_name: '.zap/rules.tsv'
          issue_title: 'ZAP Security Scan'
