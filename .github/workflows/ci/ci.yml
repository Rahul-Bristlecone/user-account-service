# combining all stages like linting, testing, and coverage reporting
# into a single workflow file for simplicity.
name: CI Pipeline (Artifact-based image reuse)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (CI tag)
        run: docker build -t myapp:ci --target test -f Dockerfile_multi_stage .

      - name: Save Docker image to tarball
        run: docker save myapp:ci | gzip > myapp.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: myapp.tar.gz
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: gunzip -c myapp.tar.gz | docker load

      - name: Run linting
        run: docker run --rm myapp:ci pylint user_service

  test:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: gunzip -c myapp.tar.gz | docker load

      - name: Run tests via Docker Compose
        run: |
          docker-compose -f docker-compose-test.yml up --abort-on-container-exit --build
          docker-compose -f docker-compose-test.yml down

  coverage:
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: gunzip -c myapp.tar.gz | docker load

      - name: Run coverage
        run: docker run --rm myapp:ci pytest --cov=user_service --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml