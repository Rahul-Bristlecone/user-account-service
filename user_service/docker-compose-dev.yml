version: '3.8'
services:
  user-service:
    build:
      context: ../user_service
      dockerfile: Dockerfile
  #    target: runtime
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      store-db:
        condition: service_healthy
      redis-service:
        condition: service_started
    ports:
      - "5001:5000"

  store-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$MYSQL_USER -p$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - store_service_db:/var/lib/mysql

  redis-service:
    image: redis:7.2
    restart: always
    ports:
      - "6379:6379"

  # this is just for example of using pre-built image from DockerHub
  # user_service is not dependent on store_service
#  store-service:
#    image: myorg/store-service:latest  # how to push image on DockerHub
#    environment:
#      FLASK_ENV: test
#    env_file:
#      - .env
#    depends_on:
#      mysql-db:
#        condition: service_healthy
#    ports:
#      - "5000:5000"

volumes:
  store_service_db: