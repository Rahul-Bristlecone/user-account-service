version: '3.8'
services:
  user-service:
    image: sharma92/daemons:user-auth
    restart: always
  #    target: runtime
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      store-db:
        condition: service_healthy
      redis-service:
        condition: service_started
    ports:
      - "5001:5000"

  store-service:
    image: sharma92/daemons:store-service
    env_file:
      - .env
    environment:
      - FLASK_ENV=development
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    depends_on:
      store-db:
        condition: service_healthy
      redis-service:
        condition: service_started
    ports:
      - "5002:5000"

  store-db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$MYSQL_USER -p$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - store_service_db:/var/lib/mysql

  redis-service:
    image: redis:7.2
    restart: always
    ports:
      - "6379:6379"

volumes:
  store_service_db: